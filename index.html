<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代 BMI 計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .result-box {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="p-4">

    <div class="glass-card w-full max-w-md p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">BMI 計算器</h1>
        <p class="text-gray-500 text-center mb-8">輸入身高與體重，快速評估健康狀況</p>

        <div class="space-y-6">
            <!-- 身高輸入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">身高 (公分)</label>
                <input type="number" id="height" placeholder="例如：175" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <!-- 體重輸入 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">體重 (公斤)</label>
                <input type="number" id="weight" placeholder="例如：70" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <!-- 計算按鈕 -->
            <button onclick="calculateBMI()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors duration-200 transform active:scale-95 shadow-lg">
                立即計算
            </button>

            <!-- 結果顯示區 -->
            <div id="resultContainer" class="hidden result-box mt-8 p-6 rounded-2xl border-2">
                <div class="text-center">
                    <p class="text-gray-600 mb-1">您的 BMI 為</p>
                    <h2 id="bmiValue" class="text-5xl font-black mb-2">--</h2>
                    <p id="bmiCategory" class="text-xl font-bold mb-4">--</p>
                    <div id="bmiMessage" class="text-sm text-gray-600 bg-white/50 p-3 rounded-lg">
                        <!-- 動態建議 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 參考表格 -->
        <div class="mt-8 pt-6 border-t border-gray-200">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 text-center">BMI 參考標準</h3>
            <div class="grid grid-cols-2 gap-2 text-xs text-gray-500">
                <div class="flex justify-between"><span>體重過輕:</span> <span>< 18.5</span></div>
                <div class="flex justify-between"><span>正常範圍:</span> <span>18.5 - 24</span></div>
                <div class="flex justify-between"><span>異常過重:</span> <span>24 - 27</span></div>
                <div class="flex justify-between"><span>肥胖:</span> <span>> 27</span></div>
            </div>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');
            const resultContainer = document.getElementById('resultContainer');
            const bmiValueDisplay = document.getElementById('bmiValue');
            const bmiCategoryDisplay = document.getElementById('bmiCategory');
            const bmiMessageDisplay = document.getElementById('bmiMessage');

            const height = parseFloat(heightInput.value);
            const weight = parseFloat(weightInput.value);

            // 驗證輸入
            if (!height || !weight || height <= 0 || weight <= 0) {
                alert("請輸入有效的身高與體重數據！");
                return;
            }

            // BMI 公式 = 體重(kg) / 身高(m)^2
            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);

            // 判斷等級與風格
            let category = "";
            let colorClass = "";
            let message = "";
            let borderColor = "";

            if (bmi < 18.5) {
                category = "體重過輕";
                colorClass = "text-blue-500";
                borderColor = "border-blue-200 bg-blue-50";
                message = "您的體重稍輕，建議攝取均衡營養並規律運動來增加肌肉。";
            } else if (bmi >= 18.5 && bmi < 24) {
                category = "理想範圍";
                colorClass = "text-green-600";
                borderColor = "border-green-200 bg-green-50";
                message = "太棒了！您的體重維持在理想範圍內，請繼續保持健康的生活習慣。";
            } else if (bmi >= 24 && bmi < 27) {
                category = "異常過重";
                colorClass = "text-orange-500";
                borderColor = "border-orange-200 bg-orange-50";
                message = "提醒您，目前的體重稍微偏重，建議調整飲食並增加有氧運動。";
            } else {
                category = "肥胖";
                colorClass = "text-red-600";
                borderColor = "border-red-200 bg-red-50";
                message = "您的 BMI 已進入肥胖區間。為了您的健康，建議諮詢醫師或營養師。";
            }

            // 更新 UI
            resultContainer.className = `result-box mt-8 p-6 rounded-2xl border-2 ${borderColor}`;
            resultContainer.classList.remove('hidden');
            
            bmiValueDisplay.textContent = bmi;
            bmiValueDisplay.className = `text-5xl font-black mb-2 ${colorClass}`;
            
            bmiCategoryDisplay.textContent = category;
            bmiCategoryDisplay.className = `text-xl font-bold mb-4 ${colorClass}`;
            
            bmiMessageDisplay.textContent = message;

            // 滾動到結果 (對手機使用者友善)
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 監聽 Enter 鍵
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                calculateBMI();
            }
        });
    </script>
</body>
</html>
